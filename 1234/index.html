<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Corso CeFRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0056b3;
            --primary-light: #eef6ff;
            --accent: #00a8e8;
            --text: #212529;
            --text-muted: #6c757d;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --border: #eef0f2;
            --danger: #dc3545;
            --success: #198754;
            --warning: #f39c12;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-content: start;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            border: 1px solid white;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        .card:nth-child(5) { animation-delay: 0.4s; }

        .card-full { grid-column: 1 / -1; }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nuova Griglia Statistiche Chiarissima */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .stat-box span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-box strong {
            font-size: 28px;
            color: var(--text);
            margin-top: 5px;
            font-weight: 800;
        }

        .stat-box.highlight strong { color: var(--primary); }
        .stat-box.highlight-alt strong { color: var(--accent); }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 12px;
            height: 24px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            border-radius: 12px;
            transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        /* Timeline e Stati */
        .timeline {
            margin-top: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .lesson-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .lesson-item:last-child { border-bottom: none; }

        .lesson-info { display: flex; flex-direction: column; gap: 4px; }
        .lesson-date { font-weight: 600; color: var(--text); }
        .lesson-topic { color: var(--text-muted); font-size: 13px; }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }

        .done .status-badge { background: #e8f5e9; color: var(--success); }
        .next .status-badge { background: var(--primary-light); color: var(--primary); }
        .future .status-badge { background: var(--border); color: var(--text-muted); }
        
        /* Animazione Lezione In Corso */
        .in-progress .status-badge {
            background: #ffebee;
            color: var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            background: var(--primary-light); color: var(--primary);
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }
        button.btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2); }
        button:hover { transform: translateY(-2px); }
        button:active { transform: scale(0.98); }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Tracker CeFRA Modulo 135</h1>
            <p>Croce Bianca Brescia - Sez. Pontevico</p>
        </div>

        <div class="card card-full">
            <h2>Situazione Globale</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%;">0%</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box highlight">
                    <span>Ore Fatte</span>
                    <strong id="hours-done">0</strong>
                </div>
                <div class="stat-box">
                    <span>Ore Rimaste</span>
                    <strong id="hours-left">0</strong>
                </div>
                <div class="stat-box highlight-alt">
                    <span>Lez. Fatte</span>
                    <strong id="lessons-done">0</strong>
                </div>
                <div class="stat-box">
                    <span>Lez. Rimaste</span>
                    <strong id="lessons-left">0</strong>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 id="focus-card-title">Prossima Lezione</h2>
            <div id="focus-date" style="font-size: 24px; font-weight: 800; color: var(--accent); margin: 5px 0; letter-spacing:-0.5px;">--/--/----</div>
            <p id="focus-topic" style="margin-top:10px; color:var(--text); font-weight:600;">Argomento: -</p>
            <p id="focus-time">Orario: -</p>
        </div>

        <div class="card">
            <h2>Gestione Assenze</h2>
            <p>Limite AREU max: <strong>7.5 ore</strong> (10%)</p>
            <div id="absence-hours" style="font-size: 28px; font-weight: 800; margin: 5px 0;">0h</div>
            <p id="absence-status">Stato: Sicuro.</p>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="addAbsence()">+ 1h Assenza</button>
                <button onclick="resetAbsence()">Azzera</button>
            </div>
        </div>

        <div class="card card-full">
            <h2>Registro Lezioni</h2>
            <div class="timeline" id="timeline">
                </div>
        </div>
    </div>

    <script>
        const courseData = [
            { date: "2026-01-14T20:30:00", duration: 3, topic: "Ruolo e Responsabilità / Trauma" },
            { date: "2026-01-21T20:30:00", duration: 2.5, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-01-26T20:30:00", duration: 2.5, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-02-04T20:30:00", duration: 2.5, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-02-11T20:30:00", duration: 2.5, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-02-16T20:30:00", duration: 3, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-02-18T20:30:00", duration: 3, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-02-25T20:30:00", duration: 3, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-03-04T20:30:00", duration: 3, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-03-11T20:30:00", duration: 3, topic: "TRAUMA - Approfondimenti" },
            { date: "2026-03-16T20:30:00", duration: 3, topic: "TRAUMA / EMERGENZE MEDICHE" },
            { date: "2026-03-18T20:30:00", duration: 3, topic: "EMERGENZE MEDICHE - Approfondimenti" },
            { date: "2026-03-23T20:30:00", duration: 3, topic: "EMERGENZE MEDICHE - Approfondimenti" },
            { date: "2026-03-25T20:30:00", duration: 3, topic: "EMERGENZE MEDICHE - Approfondimenti" },
            { date: "2026-03-30T20:30:00", duration: 3, topic: "EMERGENZE MEDICHE - Approfondimenti" },
            { date: "2026-04-01T20:30:00", duration: 2, topic: "EMERGENZE MEDICHE - Approfondimenti" },
            { date: "2026-04-08T20:30:00", duration: 1, topic: "ASPETTI PSICOLOGICI" },
            { date: "2026-04-13T20:30:00", duration: 2, topic: "URGENZE OSTETRICO GINECOLOGICHE" },
            { date: "2026-04-15T20:30:00", duration: 2, topic: "EMERGENZE AMBIENTALI / TRATTAMENTO PRIMARIO" },
            { date: "2026-04-20T20:30:00", duration: 2, topic: "IL TRATTAMENTO PRIMARIO - Approfondimenti" },
            { date: "2026-04-22T20:30:00", duration: 3, topic: "IL TRATTAMENTO PRIMARIO - Approfondimenti" },
            { date: "2026-04-27T20:30:00", duration: 3, topic: "IL TRATTAMENTO PRIMARIO - Approfondimenti" },
            { date: "2026-04-29T20:30:00", duration: 3, topic: "LE OPERAZIONI D'AMBULANZA" },
            { date: "2026-05-04T20:30:00", duration: 3, topic: "LE OPERAZIONI D'AMBULANZA" },
            { date: "2026-05-06T20:30:00", duration: 3, topic: "MAXIEMERGENZA" },
            { date: "2026-05-11T20:30:00", duration: 3, topic: "MAXIEMERGENZA" },
            { date: "2026-05-13T20:30:00", duration: 2, topic: "MAXIEMERGENZA" },
            { date: "2026-05-23T14:00:00", duration: 3, topic: "RIPASSO E VALUTAZIONE" },
            { date: "2026-06-01T00:00:00", duration: 3, topic: "ESAME FINALE" } 
        ];

        let absences = localStorage.getItem('sse_absences') ? parseFloat(localStorage.getItem('sse_absences')) : 0;
        
        function initDashboard() {
            const now = new Date();
            let totalHours = 0;
            let completedHours = 0;
            let totalLessons = courseData.length;
            let completedLessons = 0;
            
            let nextLesson = null;
            let ongoingLesson = null;
            
            const timelineContainer = document.getElementById('timeline');
            timelineContainer.innerHTML = '';

            courseData.forEach((lesson) => {
                totalHours += lesson.duration;
                const lessonStart = new Date(lesson.date);
                // Calcolo fine lezione convertendo le ore in millisecondi
                const lessonEnd = new Date(lessonStart.getTime() + (lesson.duration * 60 * 60 * 1000));
                
                let statusClass = 'future';
                let statusText = 'Da svolgere';

                if (now > lessonEnd) {
                    completedHours += lesson.duration;
                    completedLessons++;
                    statusClass = 'done';
                    statusText = '✓ Completata';
                } else if (now >= lessonStart && now <= lessonEnd) {
                    ongoingLesson = lesson;
                    statusClass = 'in-progress';
                    statusText = '🔴 IN CORSO';
                } else {
                    if (!nextLesson && !ongoingLesson && statusClass === 'future') {
                        nextLesson = lesson;
                        statusClass = 'next';
                        statusText = '→ Prossima';
                    }
                }

                const formattedDate = lessonStart.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                
                const lessonDiv = document.createElement('div');
                lessonDiv.className = `lesson-item ${statusClass}`;
                lessonDiv.innerHTML = `
                    <div class="lesson-info">
                        <span class="lesson-date">${formattedDate} <span style="font-weight:400; color:var(--text-muted)">(${lesson.duration}h)</span></span>
                        <span class="lesson-topic">${lesson.topic}</span>
                    </div>
                    <div class="status-badge">${statusText}</div>
                `;
                timelineContainer.appendChild(lessonDiv);
            });

            // Aggiornamento Statistiche Chiare
            const hoursLeft = totalHours - completedHours;
            const lessonsLeft = totalLessons - completedLessons;

            document.getElementById('hours-done').innerText = completedHours;
            document.getElementById('hours-left').innerText = hoursLeft;
            document.getElementById('lessons-done').innerText = completedLessons;
            document.getElementById('lessons-left').innerText = lessonsLeft;

            // Animazione Progress Bar
            setTimeout(() => {
                const percentage = ((completedHours / totalHours) * 100).toFixed(1);
                const pb = document.getElementById('progress-bar');
                pb.style.width = `${percentage}%`;
                pb.innerText = `${percentage}%`;
            }, 100);

            // Gestione Box Dinamico (In Corso vs Prossima)
            const focusCardTitle = document.getElementById('focus-card-title');
            const focusDate = document.getElementById('focus-date');
            const focusTopic = document.getElementById('focus-topic');
            const focusTime = document.getElementById('focus-time');

            if (ongoingLesson) {
                focusCardTitle.innerText = "🚨 Lezione in Corso";
                focusCardTitle.style.color = "var(--danger)";
                focusDate.innerText = "Ora in aula!";
                focusDate.style.color = "var(--danger)";
                focusTopic.innerText = ongoingLesson.topic;
                
                const startObj = new Date(ongoingLesson.date);
                const endObj = new Date(startObj.getTime() + (ongoingLesson.duration * 3600000));
                focusTime.innerText = `Termina alle: ${endObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}`;
            } else if (nextLesson) {
                focusCardTitle.innerText = "Prossima Lezione";
                focusCardTitle.style.color = "var(--text)";
                const nextDateObj = new Date(nextLesson.date);
                const opts = { weekday: 'long', day: 'numeric', month: 'long' };
                let dateStr = nextDateObj.toLocaleDateString('it-IT', opts);
                
                focusDate.innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
                focusDate.style.color = "var(--accent)";
                focusTopic.innerText = `${nextLesson.topic}`;
                focusTime.innerText = `Orario: ${nextDateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })} (${nextLesson.duration}h)`;
            } else {
                focusCardTitle.innerText = "Corso Concluso";
                focusDate.innerText = "Esame completato!";
                focusTopic.innerText = "-";
                focusTime.innerText = "-";
            }

            updateAbsenceUI();
        }

        function updateAbsenceUI() {
            const valEl = document.getElementById('absence-hours');
            const statEl = document.getElementById('absence-status');
            
            valEl.innerText = `${absences}h`;
            
            if (absences >= 7.5) {
                valEl.style.color = 'var(--danger)';
                statEl.innerHTML = `<span style="color:var(--danger); font-weight:600;">Sospensione esame. Limite superato.</span>`;
            } else if (absences >= 5) {
                valEl.style.color = 'var(--warning)';
                statEl.innerHTML = `<span style="color:var(--warning); font-weight:600;">Attenzione, limite vicino.</span>`;
            } else {
                valEl.style.color = 'var(--text)';
                statEl.innerHTML = `Sei nel range di sicurezza.`;
            }
            
            localStorage.setItem('sse_absences', absences);
        }

        function addAbsence() {
            absences += 1;
            updateAbsenceUI();
        }

        function resetAbsence() {
            absences = 0;
            updateAbsenceUI();
        }

        // Avvio iniziale
        window.onload = initDashboard;
        
        // Auto-refresh ogni 60 secondi per aggiornare lo stato "In corso" in tempo reale
        setInterval(initDashboard, 60000);
    </script>
</body>
</html>
