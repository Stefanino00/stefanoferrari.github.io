<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Slot Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --bar-bg: #334155;
            --bar-fill: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .progress-wrapper {
            background-color: var(--bar-bg);
            border-radius: 9999px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2);
        }

        .progress-bar {
            background: linear-gradient(90deg, #0284c7, var(--bar-fill));
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.1s linear;
        }

        .percentage {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-top: 1.5rem;
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--text-sub);
            margin-top: 0.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="slot-title">Tracker</h1>
        <div class="progress-wrapper">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="percentage" class="percentage">0.000%</div>
        <div id="status-text" class="status-text">-</div>
    </div>

    <script>
        function updateProgress() {
            const now = new Date();
            const currentTime = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds() / 1000;

            // Slot temporali definiti in secondi dall'inizio della giornata
            const slot1Start = 7 * 3600 + 55 * 60; // 07:55
            const slot1End = 12 * 3600;            // 12:00
            const slot2Start = 13 * 3600 + 30 * 60; // 13:30
            const slot2End = 17 * 3600 + 30 * 60;   // 17:30

            let percentage = 0;
            let statusMessage = "";
            let slotTitle = "Stato Attivo";

            if (currentTime >= slot1Start && currentTime < slot1End) {
                // Primo slot giornaliero
                const totalSlot1 = slot1End - slot1Start;
                const elapsedSlot1 = currentTime - slot1Start;
                percentage = (elapsedSlot1 / totalSlot1) * 100;
                statusMessage = "Fase 1 in corso";
            } else if (currentTime >= slot2Start && currentTime < slot2End) {
                // Secondo slot giornaliero
                const totalSlot2 = slot2End - slot2Start;
                const elapsedSlot2 = currentTime - slot2Start;
                percentage = (elapsedSlot2 / totalSlot2) * 100;
                statusMessage = "Fase 2 in corso";
            } else {
                // Fuori dagli slot indicati
                percentage = 0;
                slotTitle = "Inattivo";
                if (currentTime < slot1Start) {
                    statusMessage = "In attesa di Fase 1";
                } else if (currentTime >= slot1End && currentTime < slot2Start) {
                    statusMessage = "Intervallo intermedio";
                } else {
                    statusMessage = "Ciclo giornaliero concluso";
                }
            }

            // Sicurezza per i limiti della barra grafica
            percentage = Math.max(0, Math.min(100, percentage));

            // Aggiornamento elementi della pagina
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('percentage').innerText = percentage.toFixed(3) + '%';
            document.getElementById('status-text').innerText = statusMessage;
            document.getElementById('slot-title').innerText = slotTitle;
        }

        // Aggiornamento continuo ogni 100ms per la fluidità dei tre decimali
        setInterval(updateProgress, 100);
        
        // Esecuzione immediata all'apertura
        updateProgress();
    </script>
</body>
</html>
