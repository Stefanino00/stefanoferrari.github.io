<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Esame Normativa e Sicurezza</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --correct: #16a34a;
            --correct-bg: #dcfce7;
            --correct-text: #166534;
            --wrong: #dc2626;
            --wrong-bg: #fee2e2;
            --wrong-text: #991b1b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.08), 0 4px 6px -2px rgb(0 0 0 / 0.04);
            height: fit-content;
        }
        /* Start screen */
        .start-screen { text-align: center; }
        .start-screen h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .start-screen p.subtitle {
            color: var(--muted);
            margin-top: 0;
            margin-bottom: 24px;
        }
        .mode-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .mode-btn {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            font-family: inherit;
        }
        .mode-btn:hover {
            background-color: #e2e8f0;
            border-color: var(--primary);
        }
        .mode-btn strong { display: block; margin-bottom: 4px; font-size: 1.05rem; }
        .mode-btn span { font-size: 0.85rem; color: var(--muted); }
        .start-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
        }
        .start-btn:hover { background-color: var(--primary-dark); }

        /* Progress header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .top-bar .stats {
            display: flex;
            gap: 12px;
            font-weight: 600;
        }
        .stats .ok { color: var(--correct); }
        .stats .ko { color: var(--wrong); }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            width: 0%;
            transition: width 0.3s ease;
        }
        .category-tag {
            display: inline-block;
            background-color: #eff6ff;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 22px;
            line-height: 1.45;
        }
        /* Options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #f8fafc;
            border: 2px solid var(--border);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 0.98rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--text);
            font-family: inherit;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .option-btn .letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--border);
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #eff6ff;
            border-color: var(--primary);
        }
        .option-btn:disabled { cursor: default; }
        .option-btn.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct);
            color: var(--correct-text);
        }
        .option-btn.correct .letter {
            background: var(--correct);
            color: white;
        }
        .option-btn.wrong {
            background-color: var(--wrong-bg);
            border-color: var(--wrong);
            color: var(--wrong-text);
        }
        .option-btn.wrong .letter {
            background: var(--wrong);
            color: white;
        }
        /* Feedback */
        .feedback-section {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .explanation {
            background-color: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 14px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.93rem;
            line-height: 1.55;
        }
        .next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .next-btn:hover { background-color: var(--primary-dark); }
        /* Results */
        .results-section { text-align: center; display: none; }
        .score-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 16px 0 4px;
        }
        .score-percent {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 20px;
        }
        .category-breakdown {
            text-align: left;
            background: #f8fafc;
            padding: 16px;
            border-radius: 10px;
            margin: 16px 0;
        }
        .category-breakdown h3 {
            margin: 0 0 12px 0;
            font-size: 1rem;
        }
        .cat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        .cat-row:last-child { border-bottom: none; }
        .review-section { text-align: left; margin-top: 20px; }
        .review-section h3 { font-size: 1rem; }
        .review-item {
            background: #fef2f2;
            border-left: 4px solid var(--wrong);
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
            font-size: 0.88rem;
        }
        .review-item .q { font-weight: 600; margin-bottom: 6px; }
        .review-item .your { color: var(--wrong-text); }
        .review-item .right { color: var(--correct-text); margin-top: 4px; }
        .button-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .restart-btn, .home-btn {
            background-color: var(--text);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
        }
        .home-btn { background-color: var(--muted); }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 20px; }
            h2 { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Start screen -->
    <div id="start-screen" class="start-screen">
        <h1>Simulatore Esame</h1>
        <p class="subtitle">Normativa e Sicurezza · Ing. Diana Rossi</p>
        <div class="mode-options">
            <button class="mode-btn" data-mode="all">
                <strong>Esame completo</strong>
                <span>Tutte le domande, ordine casuale</span>
            </button>
            <button class="mode-btn" data-mode="short">
                <strong>Quiz rapido</strong>
                <span>10 domande casuali</span>
            </button>
            <button class="mode-btn" data-mode="ordered">
                <strong>Studio ordinato</strong>
                <span>Domande per categoria, in ordine</span>
            </button>
        </div>
        <p style="font-size: 0.85rem; color: var(--muted); margin-top: 20px;">
            <span id="question-count-label"></span>
        </p>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-section" style="display:none;">
        <div class="top-bar">
            <span>Domanda <strong id="current-q-num">1</strong> di <strong id="total-q-num">x</strong></span>
            <span class="stats">
                <span class="ok">✓ <span id="correct-count">0</span></span>
                <span class="ko">✗ <span id="wrong-count">0</span></span>
            </span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="category-tag" id="category-tag">Categoria</span>
        <h2 id="question-text">Testo della domanda...</h2>
        <div class="options-grid" id="options-container"></div>
        <div class="feedback-section" id="feedback-section">
            <div class="explanation" id="explanation-text"></div>
            <button class="next-btn" id="next-btn">Prossima domanda</button>
        </div>
    </div>

    <!-- Results -->
    <div class="results-section" id="results-section">
        <h2 style="margin-bottom: 0;">Esame completato!</h2>
        <div class="score-display" id="score-display">0/0</div>
        <div class="score-percent" id="score-percent">0%</div>
        <p id="score-message">Valutazione...</p>

        <div class="category-breakdown" id="category-breakdown"></div>

        <div class="review-section" id="review-section" style="display:none;">
            <h3>Domande da ripassare</h3>
            <div id="review-list"></div>
        </div>

        <div class="button-row">
            <button class="restart-btn" id="restart-btn">Rifai il test</button>
            <button class="home-btn" id="home-btn">Cambia modalità</button>
        </div>
    </div>
</div>

<script>
// =====================================================
// DATABASE DOMANDE
// Coerente con i PDF: D.Lgs. 81/08, Direttiva Macchine
// 17/10, Codice del Consumo, microclima, rumore, SIL,
// PES, WBGT, DPI, segnaletica.
// =====================================================
const quizData = [
    // ---------- DEFINIZIONI ----------
    {
        category: "Definizioni",
        question: "Qual è la differenza principale tra infortunio e malattia professionale?",
        options: [
            "L'infortunio avviene solo nel tragitto casa-lavoro, la malattia in fabbrica",
            "L'infortunio è un evento rapido e violento concentrato nel tempo; la malattia deriva da un'esposizione lenta e progressiva",
            "Non c'è differenza normativa ai sensi del D.Lgs. 81/08",
            "L'infortunio riguarda danni alle macchine, la malattia ai lavoratori"
        ],
        correct: 1,
        explanation: "L'infortunio ha causa violenta e concentrata nel tempo (es. taglio, caduta). La malattia professionale emerge dopo esposizione prolungata a un rischio (es. ipoacusia da rumore continuo)."
    },
    {
        category: "Definizioni",
        question: "Come si definisce il 'rischio' nella normativa di sicurezza?",
        options: [
            "Una proprietà intrinseca di una sostanza o attrezzo",
            "Il numero di infortuni registrati in azienda nell'ultimo anno",
            "La probabilità che un evento dannoso si verifichi, moltiplicata per la gravità del danno atteso (R = P × G)",
            "Un sinonimo tecnico di 'pericolo'"
        ],
        correct: 2,
        explanation: "Il rischio è un concetto probabilistico: R = P × G. Si combinano la probabilità che il pericolo si concretizzi e la magnitudo del danno conseguente."
    },
    {
        category: "Definizioni",
        question: "Cosa si intende per 'sicurezza' nell'ambito del D.Lgs. 81/08?",
        options: [
            "L'assenza totale di qualunque pericolo nell'ambiente di lavoro",
            "La condizione in cui i rischi sono stati eliminati o ridotti a un livello giudicato accettabile tramite misure di prevenzione e protezione",
            "Il rispetto formale delle ispezioni periodiche da parte dell'INAIL",
            "Una certificazione volontaria rilasciata dall'UNI"
        ],
        correct: 1,
        explanation: "La sicurezza non è assenza assoluta di pericolo, ma uno stato in cui i rischi sono stati portati ad un livello accettabile mediante adeguate misure di prevenzione e protezione."
    },
    {
        category: "Definizioni",
        question: "Cosa si intende per 'Mancato Incidente' (Near Miss)?",
        options: [
            "Un infortunio lieve che non richiede giorni di mutua",
            "Un evento imprevisto che avrebbe potuto causare un danno, ma per puro caso o circostanze fortuite non l'ha fatto",
            "Un incidente causato da negligenza diretta del lavoratore",
            "Un malfunzionamento del software gestionale aziendale"
        ],
        correct: 1,
        explanation: "Il near miss è il 'quasi infortunio': analizzarlo è fondamentale perché permette di intervenire sulle procedure prima che si verifichi un danno reale (es. gancio di una gru che si rompe quando nessuno passa sotto)."
    },
    {
        category: "Definizioni",
        question: "Qual è la differenza fra direttiva sociale e direttiva di prodotto?",
        options: [
            "La direttiva sociale è nazionale, quella di prodotto è solo internazionale",
            "Le direttive sociali tutelano la salute e sicurezza dei lavoratori sul luogo di lavoro; le direttive di prodotto dettano i requisiti costruttivi essenziali per immettere un bene sul mercato",
            "Sono sinonimi: cambia solo il nome a seconda dell'ente che le emette",
            "La direttiva di prodotto si applica solo ai prodotti alimentari"
        ],
        correct: 1,
        explanation: "Le direttive sociali (es. 89/391/CEE recepita col D.Lgs. 81/08) tutelano i lavoratori. Le direttive di prodotto (es. Direttiva Macchine) stabiliscono i requisiti essenziali di sicurezza per immettere un bene sul mercato europeo."
    },
    {
        category: "Definizioni",
        question: "Pericolo e rischio: qual è la distinzione corretta?",
        options: [
            "Sono sinonimi nel linguaggio tecnico",
            "Il pericolo è la proprietà intrinseca di un fattore di causare danni; il rischio è la probabilità che tale potenziale si trasformi in danno reale",
            "Il pericolo è quantitativo, il rischio è qualitativo",
            "Il rischio riguarda solo le persone, il pericolo solo le cose"
        ],
        correct: 1,
        explanation: "Esempio classico: uno squalo è un pericolo (proprietà intrinseca di causare danno). Il rischio di essere morsi è alto se ci nuoti vicino, nullo se lo guardi in TV."
    },

    // ---------- NORMATIVE E NORME TECNICHE ----------
    {
        category: "Normative",
        question: "Cos'è una norma tecnica e che valore ha?",
        options: [
            "È una legge dello Stato vincolante per tutti",
            "È un documento approvato da un organismo riconosciuto (UNI, CEI, ISO, EN) che stabilisce le regole 'a regola d'arte'; non è vincolante ma dà presunzione di conformità",
            "È un regolamento europeo direttamente applicabile",
            "È un'indicazione interna emanata dal datore di lavoro"
        ],
        correct: 1,
        explanation: "La norma tecnica è volontaria, ma applicarla dà presunzione di conformità. Si acquista presso i portali ufficiali (es. UNI Store)."
    },
    {
        category: "Normative",
        question: "Quali sono i principali enti normatori di riferimento citati nel corso?",
        options: [
            "INAIL, INPS, ASL",
            "UNI e CEI per l'Italia, ISO ed EN a livello internazionale/europeo",
            "ANSA, RAI, FCC",
            "Solo l'Unione Europea tramite regolamenti"
        ],
        correct: 1,
        explanation: "UNI (Ente Italiano di Normazione) e CEI (Comitato Elettrotecnico Italiano) operano in Italia. A livello internazionale ed europeo intervengono ISO ed EN."
    },
    {
        category: "Normative",
        question: "Cos'è il Codice del Consumo?",
        options: [
            "Una norma tecnica volontaria pubblicata dall'UNI",
            "Il testo unico (D.Lgs. 206/2005) che raggruppa le normative a tutela dei consumatori e utenti finali non professionali",
            "Il regolamento interno delle aziende per la sicurezza dei lavoratori",
            "La direttiva europea sulle macchine industriali"
        ],
        correct: 1,
        explanation: "Il Codice del Consumo (D.Lgs. 206/2005) tutela i diritti dei consumatori finali, garantendo che i prodotti immessi nel mercato civile siano sicuri, trasparenti e privi di clausole vessatorie."
    },
    {
        category: "Normative",
        question: "Quale di questi è un esempio tipico di prodotto ai sensi del Codice del Consumo?",
        options: [
            "Una pressa piegatrice industriale",
            "Un tornio CNC",
            "Un asciugacapelli domestico acquistato da un cittadino privato",
            "Un nastro trasportatore di stabilimento"
        ],
        correct: 2,
        explanation: "Il Codice del Consumo tutela il consumatore finale: asciugacapelli, frullatori, tostapane, televisori. Le macchine industriali ricadono invece sotto la Direttiva Macchine (D.Lgs. 17/10)."
    },

    // ---------- FIGURE DI PREVENZIONE ----------
    {
        category: "Figure 81/08",
        question: "Chi è il Datore di Lavoro nel D.Lgs. 81/08?",
        options: [
            "Il consulente esterno che redige il DVR",
            "Il titolare del rapporto di lavoro con il lavoratore, che ha responsabilità organizzativa e detiene poteri decisionali e di spesa",
            "Il preposto al controllo dei reparti produttivi",
            "Il medico competente designato dall'azienda"
        ],
        correct: 1,
        explanation: "Il Datore di Lavoro è il titolare del rapporto di lavoro. Ha obblighi non delegabili, tra cui la valutazione di tutti i rischi e la stesura del DVR."
    },
    {
        category: "Figure 81/08",
        question: "Cosa fa il RSPP?",
        options: [
            "Rappresenta i lavoratori nelle consultazioni sulla sicurezza",
            "Visita medicalmente i lavoratori esposti",
            "È la figura tecnica che affianca il Datore di Lavoro nella valutazione dei rischi e redazione del documento",
            "Sostituisce il Datore di Lavoro nelle responsabilità penali"
        ],
        correct: 2,
        explanation: "Il RSPP (Responsabile Servizio Prevenzione e Protezione) è la figura tecnica che affianca il Datore di Lavoro per la valutazione e la redazione del DVR."
    },
    {
        category: "Figure 81/08",
        question: "Chi è il RLS?",
        options: [
            "Il Responsabile della Linea di Sicurezza in produzione",
            "Il Rappresentante dei Lavoratori per la Sicurezza, eletto dai lavoratori per farne le veci nelle consultazioni sulla prevenzione",
            "Il Referente Legale della Sicurezza, nominato dal datore di lavoro",
            "Una figura prevista solo nelle aziende con più di 250 dipendenti"
        ],
        correct: 1,
        explanation: "Il RLS è eletto dai lavoratori e li rappresenta nelle consultazioni con il datore di lavoro sui temi di salute e sicurezza."
    },
    {
        category: "Figure 81/08",
        question: "Quale obbligo del Datore di Lavoro NON è delegabile?",
        options: [
            "L'acquisto dei DPI",
            "La manutenzione delle macchine",
            "La valutazione di tutti i rischi e la stesura del Documento di Valutazione dei Rischi (DVR)",
            "L'organizzazione dei turni di lavoro"
        ],
        correct: 2,
        explanation: "Il D.Lgs. 81/08 individua tra gli obblighi non delegabili del Datore di Lavoro la valutazione di tutti i rischi e la conseguente stesura del DVR."
    },
    {
        category: "Figure 81/08",
        question: "In cosa consiste la 'valutazione del rischio'?",
        options: [
            "Nel calcolo del premio assicurativo INAIL annuale",
            "Nel processo con cui il Datore di Lavoro individua i pericoli, identifica i soggetti esposti, stima la magnitudo del rischio e definisce le misure per abbatterlo, confluente nel DVR",
            "In un'ispezione tecnica delle macchine eseguita ogni 5 anni",
            "Nella verifica delle credenziali del personale qualificato"
        ],
        correct: 1,
        explanation: "È il processo obbligatorio strutturato per mappare pericoli, esposti e misure di prevenzione/protezione. Confluisce nel DVR."
    },

    // ---------- DPI ----------
    {
        category: "DPI",
        question: "Quale di queste è la definizione corretta di DPI?",
        options: [
            "Dispositivo di Pulizia Industriale, usato per disinfettare i reparti",
            "Documento di Prevenzione Interna allegato al DVR",
            "Dispositivo di Protezione Individuale: attrezzatura destinata ad essere indossata dal lavoratore per proteggerlo da uno o più rischi",
            "Direttiva di Prodotto Industriale"
        ],
        correct: 2,
        explanation: "I DPI sono attrezzature indossate dal lavoratore (caschi, otoprotettori, guanti isolanti, scarpe antinfortunistiche, imbracature) per proteggerlo da rischi specifici."
    },
    {
        category: "DPI",
        question: "Prima dell'acquisto di un DPI, quale verifica NON è prevista?",
        options: [
            "Verificare che sia marchiato CE e provvisto di manuale informativo",
            "Verificare che sia adeguato ai rischi senza comportare di per sé un rischio maggiore",
            "Verificare che sia compatibile con altri DPI già forniti al lavoratore",
            "Verificare che sia stato prodotto in Italia"
        ],
        correct: 3,
        explanation: "Il paese di produzione non è un requisito. Servono: marcatura CE, adeguatezza al rischio, ergonomia, compatibilità con gli altri DPI in uso."
    },
    {
        category: "DPI",
        question: "Quale di questi è un esempio di DPI per la protezione dell'udito?",
        options: [
            "Caschetto di sicurezza",
            "Otoprotettori (cuffie o tappi auricolari)",
            "Imbracatura per lavori in quota",
            "Guanti isolanti"
        ],
        correct: 1,
        explanation: "Gli otoprotettori (cuffie o tappi) proteggono l'udito. Caschetto, imbracatura e guanti proteggono rispettivamente capo, cadute e mani."
    },

    // ---------- SEGNALETICA ----------
    {
        category: "Segnaletica",
        question: "Un cartello ROTONDO ROSSO con barra obliqua significa:",
        options: [
            "Avvertimento / pericolo generico",
            "Divieto (es. 'Vietato fumare')",
            "Prescrizione / obbligo (es. 'Indossare i guanti')",
            "Salvataggio / uscita di sicurezza"
        ],
        correct: 1,
        explanation: "Rosso + rotondo = divieto. Giallo + triangolare = avvertimento. Azzurro + rotondo = prescrizione/obbligo. Verde + quadrato = salvataggio/uscite di sicurezza."
    },
    {
        category: "Segnaletica",

// =====================================================
// STATO
// =====================================================
let activeQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let wrongCount = 0;
let answered = false;
let wrongAnswers = []; // per la sezione "ripasso"

// DOM
const startScreen = document.getElementById('start-screen');
const quizSection = document.getElementById('quiz-section');
const resultsSection = document.getElementById('results-section');
const questionCountLabel = document.getElementById('question-count-label');

const questionText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const feedbackSection = document.getElementById('feedback-section');
const explanationText = document.getElementById('explanation-text');
const nextBtn = document.getElementById('next-btn');
const categoryTag = document.getElementById('category-tag');

const currentQNum = document.getElementById('current-q-num');
const totalQNum = document.getElementById('total-q-num');
const progressFill = document.getElementById('progress-fill');
const correctCount = document.getElementById('correct-count');
const wrongCountEl = document.getElementById('wrong-count');

const scoreDisplay = document.getElementById('score-display');
const scorePercent = document.getElementById('score-percent');
const scoreMessage = document.getElementById('score-message');
const categoryBreakdown = document.getElementById('category-breakdown');
const reviewSection = document.getElementById('review-section');
const reviewList = document.getElementById('review-list');

// Avvio
questionCountLabel.textContent = `Banca dati: ${quizData.length} domande`;

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => startQuiz(btn.dataset.mode));
});
document.getElementById('restart-btn').addEventListener('click', () => startQuiz(window._lastMode || 'all'));
document.getElementById('home-btn').addEventListener('click', goHome);

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startQuiz(mode) {
    window._lastMode = mode;
    if (mode === 'all') {
        activeQuestions = shuffle(quizData).map(prepareQuestion);
    } else if (mode === 'short') {
        activeQuestions = shuffle(quizData).slice(0, 10).map(prepareQuestion);
    } else { // ordered
        activeQuestions = quizData.map(prepareQuestion);
    }
    currentQuestionIndex = 0;
    score = 0;
    wrongCount = 0;
    wrongAnswers = [];
    startScreen.style.display = 'none';
    quizSection.style.display = 'block';
    resultsSection.style.display = 'none';
    totalQNum.textContent = activeQuestions.length;
    correctCount.textContent = 0;
    wrongCountEl.textContent = 0;
    loadQuestion();
}

// Crea una copia della domanda con opzioni rimescolate
function prepareQuestion(q) {
    const indices = q.options.map((_, i) => i);
    const shuffled = shuffle(indices);
    const newOptions = shuffled.map(i => q.options[i]);
    const newCorrect = shuffled.indexOf(q.correct);
    return {
        category: q.category,
        question: q.question,
        options: newOptions,
        correct: newCorrect,
        explanation: q.explanation
    };
}

function goHome() {
    quizSection.style.display = 'none';
    resultsSection.style.display = 'none';
    startScreen.style.display = 'block';
}

function loadQuestion() {
    answered = false;
    feedbackSection.style.display = 'none';
    const q = activeQuestions[currentQuestionIndex];
    questionText.textContent = q.question;
    categoryTag.textContent = q.category;
    currentQNum.textContent = currentQuestionIndex + 1;
    const progress = Math.round((currentQuestionIndex / activeQuestions.length) * 100);
    progressFill.style.width = `${progress}%`;
    optionsContainer.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
    q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="letter">${letters[index]}</span><span>${opt}</span>`;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function checkAnswer(selectedIndex, btnElement) {
    if (answered) return;
    answered = true;
    const q = activeQuestions[currentQuestionIndex];
    const buttons = optionsContainer.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    if (selectedIndex === q.correct) {
        btnElement.classList.add('correct');
        score++;
        correctCount.textContent = score;
    } else {
        btnElement.classList.add('wrong');
        buttons[q.correct].classList.add('correct');
        wrongCount++;
        wrongCountEl.textContent = wrongCount;
        wrongAnswers.push({
            question: q.question,
            category: q.category,
            your: q.options[selectedIndex],
            right: q.options[q.correct],
            explanation: q.explanation
        });
    }
    explanationText.textContent = q.explanation;
    feedbackSection.style.display = 'flex';
    nextBtn.textContent = (currentQuestionIndex === activeQuestions.length - 1)
        ? "Vedi risultati" : "Prossima domanda";
    nextBtn.focus();
}

nextBtn.onclick = () => {
    currentQuestionIndex++;
    if (currentQuestionIndex < activeQuestions.length) {
        loadQuestion();
    } else {
        showResults();
    }
};

// Supporto tastiera: 1-4 per rispondere, Invio per next
document.addEventListener('keydown', (e) => {
    if (quizSection.style.display !== 'block') return;
    if (!answered) {
        const num = parseInt(e.key);
        if (num >= 1 && num <= 6) {
            const btns = optionsContainer.querySelectorAll('.option-btn');
            if (btns[num - 1]) btns[num - 1].click();
        }
    } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        nextBtn.click();
    }
});

function showResults() {
    quizSection.style.display = 'none';
    resultsSection.style.display = 'block';
    progressFill.style.width = '100%';
    const total = activeQuestions.length;
    scoreDisplay.textContent = `${score} / ${total}`;
    const perc = Math.round((score / total) * 100);
    scorePercent.textContent = `${perc}%`;
    if (perc === 100) scoreMessage.textContent = "Perfetto! Esame in tasca.";
    else if (perc >= 85) scoreMessage.textContent = "Ottimo, padronanza solida dei concetti.";
    else if (perc >= 70) scoreMessage.textContent = "Buono, qualche dettaglio da rivedere.";
    else if (perc >= 50) scoreMessage.textContent = "Sufficiente, ma c'è ancora da ripassare.";
    else scoreMessage.textContent = "Da rivedere bene, riparti dalle definizioni.";

    // Breakdown per categoria
    const byCategory = {};
    activeQuestions.forEach((q, i) => {
        if (!byCategory[q.category]) byCategory[q.category] = { ok: 0, total: 0 };
        byCategory[q.category].total++;
    });
    // calcola corretti per categoria
    activeQuestions.forEach((q, i) => {
        const wasWrong = wrongAnswers.some(w => w.question === q.question);
        if (!wasWrong) byCategory[q.category].ok++;
    });

    let breakdownHTML = '<h3>Risultati per categoria</h3>';
    for (const cat in byCategory) {
        const c = byCategory[cat];
        const pct = Math.round((c.ok / c.total) * 100);
        breakdownHTML += `<div class="cat-row"><span>${cat}</span><span><strong>${c.ok}/${c.total}</strong> (${pct}%)</span></div>`;
    }
    categoryBreakdown.innerHTML = breakdownHTML;

    // Sezione ripasso errori
    if (wrongAnswers.length > 0) {
        reviewSection.style.display = 'block';
        reviewList.innerHTML = '';
        wrongAnswers.forEach(w => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `
                <div class="q">${w.question}</div>
                <div class="your"><strong>Tu hai risposto:</strong> ${w.your}</div>
                <div class="right"><strong>Corretta:</strong> ${w.right}</div>
                <div style="margin-top:6px; color:var(--muted); font-size:0.85rem;">${w.explanation}</div>
            `;
            reviewList.appendChild(div);
        });
    } else {
        reviewSection.style.display = 'none';
    }
}
</script>
