
<!DOCTYPE html>
<!-- Codice di Stefano Ferrari -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI STefano Ferrari</title>
    <style>
        :root {
            --hmi-bg: #2b2b2b;
            --panel-bg: #1e1e1e;
            --border-color: #444;
            --text-main: #e0e0e0;
            --ind-green: #2ecc71;
            --ind-red: #e74c3c;
            --ind-yellow: #f1c40f;
            --ind-gray: #7f8c8d;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hmi-frame {
            width: 1000px;
            height: 650px;
            background-color: var(--hmi-bg);
            border: 5px solid #555;
            display: grid;
            grid-template-rows: 50px 1fr 120px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* HEADER INDUSTRIALE */
        header {
            background: linear-gradient(to bottom, #444, #222);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid #000;
        }

        .plc-status { display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
        .led { width: 12px; height: 12px; border-radius: 50%; background: var(--ind-gray); }
        .led.on { background: var(--ind-green); box-shadow: 0 0 8px var(--ind-green); }

        /* MAIN SECTION */
        .content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
        }

        h2 { font-size: 1em; color: var(--ind-yellow); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* PARAMETRI */
        .param-row { margin-bottom: 20px; }
        label { display: block; font-size: 0.75em; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--ind-green);
            padding: 10px;
            font-size: 1.4em;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }

        /* SINOTTICO (MIMIC) */
        .mimic {
            position: relative;
            background: #050505;
            border: 2px inset #111;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px;
        }

        .machine-row {
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            align-items: center;
            height: 60px;
        }

        .comp-label { font-size: 0.8em; font-weight: bold; }

        .cyl-track {
            height: 20px;
            background: #222;
            position: relative;
            border-radius: 10px;
            margin: 0 20px;
        }

        .cyl-piston {
            width: 50px;
            height: 14px;
            background: linear-gradient(to right, #888, #eee, #888);
            position: absolute;
            top: 3px;
            left: 0;
            transition: left 0.8s ease-in-out;
            border-radius: 2px;
        }

        .out { left: calc(100% - 50px); }

        .sensor-box { display: flex; gap: 10px; justify-content: center; }
        .sensor { font-size: 0.7em; text-align: center; color: #555; }
        .sensor-led { width: 10px; height: 10px; border-radius: 50%; background: #222; margin: 0 auto 3px; border: 1px solid #444; }
        .sensor-led.active { background: var(--ind-green); box-shadow: 0 0 5px var(--ind-green); }

        /* FOOTER COMANDI */
        footer {
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid #000;
            padding: 0 20px;
        }

        .btn {
            height: 70px;
            min-width: 140px;
            border: 3px solid #000;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2);
            transition: 0.1s;
        }

        .btn:active { box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); transform: translateY(2px); }

        .btn-start { background: var(--ind-green); color: #000; }
        .btn-stop { background: var(--ind-red); color: #fff; }
        .btn-reset { background: #444; color: #fff; }
        
        .btn-emergency {
            width: 100px;
            height: 100px;
            background: var(--ind-yellow);
            border-radius: 50%;
            border: 5px solid var(--ind-red);
            color: var(--ind-red);
            font-size: 0.7em;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .status-banner {
            background: #000;
            color: var(--ind-yellow);
            padding: 5px 15px;
            border: 1px solid var(--ind-yellow);
            font-family: monospace;
            text-align: center;
        }

        /* LUCI L1 L2 */
        .lights { display: flex; gap: 20px; align-items: center; }
        .light-wrap { text-align: center; font-size: 0.8em; }
        .l-bulb { width: 30px; height: 30px; border-radius: 50%; background: #111; border: 2px solid #333; margin-bottom: 5px; }
        .l-bulb.yellow.on { background: var(--ind-yellow); box-shadow: 0 0 15px var(--ind-yellow); }
        .l-bulb.green.on { background: var(--ind-green); box-shadow: 0 0 15px var(--ind-green); }
        .blink { animation: blink-anim 0.5s infinite; }
        @keyframes blink-anim { 50% { opacity: 0.1; } }

    </style>
</head>
<body>

<div class="hmi-frame">
    <header>
        <div class="plc-status"><div class="led on"></div> PLC ONLINE</div>
        <div style="letter-spacing: 3px; font-weight: bold;">HMI Stefano Ferrari</div>
        <div id="clock">12:00:00</div>
    </header>

    <main class="content">
        <section class="panel">
            <h2>CONTROLLO PROCESSO</h2>
            <div class="param-row">
                <label>Tempo di attesa (X sec)</label>
                <input type="number" id="val-x" value="2">
            </div>
            <div class="param-row">
                <label>Cicli programmati (N)</label>
                <input type="number" id="val-n" value="5">
            </div>
            <div class="param-row">
                <label>Stato Attuale</label>
                <div id="msg-status" class="status-banner">SISTEMA IDLE</div>
            </div>
            <div class="param-row">
                <label>Progresso Cicli</label>
                <div style="font-size: 2em; color: var(--ind-green); font-family: monospace;" id="count-display">0 / 0</div>
            </div>
        </section>

        <section class="mimic">
            <!-- Cilindro E -->
            <div class="machine-row">
                <div class="comp-label">CILINDRO E</div>
                <div class="cyl-track"><div id="piston-e" class="cyl-piston"></div></div>
                <div class="sensor-box">
                    <div class="sensor"><div id="s-e0" class="sensor-led active"></div>E0</div>
                    <div class="sensor"><div id="s-e1" class="sensor-led"></div>E1</div>
                </div>
            </div>

            <!-- Pinza PZ -->
            <div class="machine-row">
                <div class="comp-label">PINZA PZ</div>
                <div style="text-align: center;">
                    <div id="box-pz" style="width: 40px; height: 40px; background: #333; margin: 0 auto; border: 2px solid #555;"></div>
                    <div id="txt-pz" style="font-size: 0.7em; margin-top: 5px;">APERTA</div>
                </div>
                <div></div>
            </div>

            <!-- Cilindro F -->
            <div class="machine-row">
                <div class="comp-label">CILINDRO F</div>
                <div class="cyl-track"><div id="piston-f" class="cyl-piston"></div></div>
                <div class="sensor-box">
                    <div class="sensor"><div id="s-f0" class="sensor-led active"></div>F0</div>
                    <div class="sensor"><div id="s-f1" class="sensor-led"></div>F1</div>
                </div>
            </div>

            <!-- Rotary RC -->
            <div class="machine-row">
                <div class="comp-label">ROTARY RC</div>
                <div style="text-align: center;">
                    <div id="wheel-rc" style="width: 40px; height: 40px; border: 3px dashed #444; border-radius: 50%; margin: 0 auto;"></div>
                </div>
                <div id="txt-rc" style="font-size: 0.7em;">FERMO</div>
            </div>
        </section>
    </main>

    <footer>
        <div class="lights">
            <div class="light-wrap"><div id="l1" class="l-bulb yellow on"></div>L1</div>
            <div class="light-wrap"><div id="l2" class="l-bulb green"></div>L2</div>
        </div>

        <button class="btn btn-reset" onclick="ui_reset()">RESET (P0)</button>
        <button class="btn btn-start" onclick="ui_start()">START (P1)</button>
        <button class="btn btn-stop" onclick="ui_stop()">STOP (P2)</button>
        
        <div class="btn-emergency" onclick="ui_emergency()">
            <div style="font-weight: bold;">EMERGENZA</div>
            <div style="font-size: 0.7em;">P0</div>
        </div>
    </footer>
</div>

<script>
    let cycleActive = false;
    let emergencyMode = false;
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    async function setSensor(id, state) {
        document.getElementById(id).classList.toggle('active', state);
    }

    async function ui_reset() {
        if(cycleActive) return;
        emergencyMode = false;
        document.getElementById('l1').classList.remove('blink');
        document.getElementById('l1').classList.add('on');
        document.getElementById('l2').classList.remove('on');
        document.getElementById('msg-status').innerText = "SISTEMA PRONTO";
        document.getElementById('msg-status').style.color = "var(--ind-green)";
        
        // Portiamo tutto a stato iniziale
        document.getElementById('piston-e').classList.remove('out');
        document.getElementById('piston-f').classList.remove('out');
        document.getElementById('box-pz').style.background = "#333";
        document.getElementById('txt-pz').innerText = "APERTA";
        document.getElementById('wheel-rc').style.animation = "";
        document.getElementById('wheel-rc').style.borderColor = "#444";
        
        await sleep(800);
        setSensor('s-e0', true); setSensor('s-e1', false);
        setSensor('s-f0', true); setSensor('s-f1', false);
    }

    async function ui_start() {
        if(cycleActive || emergencyMode) return;
        
        const n = parseInt(document.getElementById('val-n').value);
        const x = parseInt(document.getElementById('val-x').value) * 1000;
        
        cycleActive = true;
        document.getElementById('l1').classList.remove('on');
        document.getElementById('l2').classList.add('on');
        document.getElementById('msg-status').innerText = "CICLO IN CORSO";

        for(let i=1; i<=n; i++) {
            if(emergencyMode) break;
            document.getElementById('count-display').innerText = i + " / " + n;

            // Sequenza
            document.getElementById('piston-e').classList.add('out');
            setSensor('s-e0', false);
            await sleep(800);
            setSensor('s-e1', true);

            document.getElementById('box-pz').style.background = "var(--ind-yellow)";
            document.getElementById('txt-pz').innerText = "CHIUSA";
            await sleep(500);

            document.getElementById('piston-e').classList.remove('out');
            setSensor('s-e1', false);
            document.getElementById('wheel-rc').style.animation = "spin 2s linear infinite";
            document.getElementById('wheel-rc').style.borderColor = "var(--ind-yellow)";
            await sleep(800);
            setSensor('s-e0', true);

            await sleep(x);

            document.getElementById('box-pz').style.background = "#333";
            document.getElementById('txt-pz').innerText = "APERTA";
            document.getElementById('piston-f').classList.add('out');
            setSensor('s-f0', false);
            await sleep(800);
            setSensor('s-f1', true);

            document.getElementById('piston-f').classList.remove('out');
            setSensor('s-f1', false);
            document.getElementById('wheel-rc').style.animation = "";
            document.getElementById('wheel-rc').style.borderColor = "#444";
            await sleep(800);
            setSensor('s-f0', true);
        }

        cycleActive = false;
        if(!emergencyMode) {
            document.getElementById('msg-status').innerText = "LAVORAZIONE TERMINE";
            document.getElementById('l2').classList.remove('on');
            document.getElementById('l1').classList.add('on');
        }
    }

    function ui_stop() {
        emergencyMode = true;
        cycleActive = false;
        document.getElementById('msg-status').innerText = "ARRESTO CICLO";
        document.getElementById('l2').classList.remove('on');
        document.getElementById('l1').classList.add('on');
    }

    function ui_emergency() {
        emergencyMode = true;
        document.getElementById('msg-status').innerText = "EMERGENZA ATTIVA";
        document.getElementById('l1').classList.add('blink', 'on');
        document.getElementById('l2').classList.remove('on');
        // E e F rientrano
        document.getElementById('piston-e').classList.remove('out');
        document.getElementById('piston-f').classList.remove('out');
    }
</script>

<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
<!-- Codice di Stefano Ferrari -->
</body>
</html>
